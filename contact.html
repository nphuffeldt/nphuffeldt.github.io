<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My GitHub Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">MyBrand</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-section">
        <h2>Get in Touch</h2>
        <p>Have a project in mind? Send us a message!</p>
        
        <form style="margin-top: 20px; max-width: 600px;">
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Name</label>
                <input type="text" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Email</label>
                <input type="email" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Message</label>
                <textarea rows="5" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;"></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 MyBrand. Hosted on GitHub Pages.</p>
    </footer>
</body>
</html>
